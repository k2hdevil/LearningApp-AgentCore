version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 18
        - nvm use 18
        - cd webapp && npm ci
    build:
      commands:
        - cd webapp && npm run build
  artifacts:
    baseDirectory: webapp/dist
    files:
      - '**/*'
  cache:
    paths:
      - webapp/node_modules/**/*
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: Cache-Control
          value: 'public, max-age=0, must-revalidate'
    - pattern: '/assets/**'
      headers:
        - key: Cache-Control
          value: 'public, max-age=31536000, immutable'
